databases:
  - name: commodity-db
    databaseName: sqldb
    plan: free


services:
  # API Backend Service
  - type: web
    name: commodity-api
    runtime: docker
    dockerContext: .
    dockerfilePath: CommodityPriceManager.ApiService/Dockerfile
    plan: free

    envVars:
      - key: ConnectionStrings__sqldb
        fromDatabase:
          name: commodity-db
          property: connectionString
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

  # Blazor WebAssembly Frontend Service
  - type: web
    name: commodity-web
    env: static
    buildCommand: |
      dotnet publish CommodityPriceManager.Web/CommodityPriceManager.Web.csproj -c Release -o output
    staticPublishPath: output/wwwroot
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: services__apiservice__https__0
        fromService:
          type: web
          name: commodity-api
          property: host


