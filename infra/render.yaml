services:
  # Database Service
  - type: database
    name: commodity-db
    databaseName: sqldb
    user: postgres
    plan: free

  # API Backend Service
  - type: web
    name: commodity-api
    env: docker
    dockerFilePath: CommodityPriceManager.ApiService/Dockerfile
    plan: free
    envVars:
      - key: ConnectionStrings__sqldb
        fromDatabase:
          name: commodity-db
          property: connectionString
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

  # Blazor WebAssembly Frontend Service
  - type: static
    name: commodity-web
    env: static
    # Since Blazor WASM is often built during the Docker stage for some, 
    # but Render Static sites are better built with 'dotnet publish'.
    # We will use the buildCommand/publishPath approach for Static sites on Render.
    buildCommand: |
      dotnet publish CommodityPriceManager.Web/CommodityPriceManager.Web.csproj -c Release -o output
    publishPath: output/wwwroot
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: services__apiservice__https__0
        fromService:
          type: web
          name: commodity-api
          property: host
